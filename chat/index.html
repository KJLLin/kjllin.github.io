<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线聊天室</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- 全局加载遮罩 -->
<div id="loadingPage" class="loading-page">
  <div class="loader"></div>
</div>

<!-- 全局通知 -->
<div id="winNotify" class="win-notify hidden"></div>

<!-- 公告栏 -->
<div id="announceBar" class="announce-bar hidden"></div>

<!-- 页面容器 -->
<div class="app-container">

  <!-- 登录页 -->
  <div id="loginPage" class="page">
    <div class="auth-card">
      <h2>用户登录</h2>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="请输入密码">
      </div>
      <div class="btn-group-row">
        <button id="loginBtn" class="btn primary">登录</button>
        <button id="toRegisterBtn" class="btn secondary">去注册</button>
      </div>
    </div>
  </div>

  <!-- 注册页 -->
  <div id="registerPage" class="page hidden">
    <div class="auth-card">
      <h2>用户注册</h2>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="regNick" placeholder="请设置昵称">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPwd" placeholder="至少8位">
      </div>
      <div class="btn-group-row">
        <button id="regBtn" class="btn primary">注册</button>
        <button id="toLoginBtn" class="btn secondary">返回登录</button>
      </div>
    </div>
  </div>

  <!-- 聊天页 -->
  <div id="chatPage" class="page hidden">
    <div class="chat-header">
      <div id="userTag">用户：未登录</div>
      <div class="chat-toolbar">
        <span>在线：<span id="onlineNum">0</span></span>
        <button id="settingBtn" class="btn small">设置</button>
        <button id="adminBtn" class="btn small warning hidden">管理后台</button>
        <button id="logoutBtn" class="btn small danger">退出登录</button>
      </div>
    </div>

    <div id="msgBox" class="msg-box"></div>

    <div class="chat-input-bar">
      <input type="text" id="msgInput" placeholder="输入消息...">
      <button id="sendBtn" class="btn primary">发送</button>
    </div>
  </div>

  <!-- 设置页 -->
  <div id="settingPage" class="page hidden">
    <div class="setting-card">
      <h3>个人设置</h3>

      <div class="form-group">
        <label>修改昵称</label>
        <input type="text" id="nickInput" placeholder="输入新昵称">
        <button id="saveNickBtn" class="btn primary small">保存昵称</button>
      </div>

      <div class="form-group">
        <label>修改密码</label>
        <input type="password" id="newPwdInput" placeholder="新密码至少8位">
        <button id="updatePwdBtn" class="btn primary small">修改密码</button>
      </div>

      <div class="form-group">
        <button id="toggleThemeBtn" class="btn secondary small">切换深色模式</button>
        <button id="showLoginLogBtn" class="btn secondary small">我的登录日志</button>
      </div>

      <button id="backToChatBtn" class="btn back-btn">返回聊天</button>
    </div>
  </div>

  <!-- 管理员后台 -->
  <div id="adminPage" class="page hidden">
    <div class="admin-container">
      <h3>管理后台</h3>

      <!-- 系统配置 -->
      <div class="admin-section">
        <h4>系统配置</h4>
        <label class="toggle-label">
          <input type="checkbox" id="requireVerifyToggle">
          新用户注册需管理员审核
        </label>
        <button id="saveConfigBtn" class="btn primary small">保存配置</button>
      </div>

      <!-- 敏感词 -->
      <div class="admin-section">
        <h4>敏感词过滤（英文逗号分隔）</h4>
        <textarea id="sensitiveWordsInput" rows="2"></textarea>
        <button id="saveSwBtn" class="btn primary small">保存敏感词</button>
      </div>

      <!-- 公告 -->
      <div class="admin-section">
        <h4>系统公告</h4>
        <textarea id="announceInput" rows="2"></textarea>
        <button id="saveAnnounceBtn" class="btn primary small">发布公告</button>
      </div>

      <!-- 待审核用户 -->
      <div class="admin-section">
        <h4>待审核用户</h4>
        <div id="verifyUserList" class="list-container"></div>
      </div>

      <!-- 所有用户 -->
      <div class="admin-section">
        <h4>用户管理</h4>
        <div id="allUserList" class="list-container"></div>
      </div>

      <!-- 登录日志 -->
      <div class="admin-section">
        <h4>登录日志</h4>
        <div id="allLoginLogList" class="list-container"></div>
      </div>

      <!-- 消息管理 -->
      <div class="admin-section">
        <button id="clearAllMsgBtn" class="btn danger small">清空所有消息</button>
      </div>

      <button id="backToChatFromAdminBtn" class="btn back-btn">返回聊天</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
