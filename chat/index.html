<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f3f3f3">
  <title>在线聊天系统 | KJLLin</title>
  <link rel="stylesheet" href="style.css">
  <!-- 提前加载Supabase SDK，避免加载失败 -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- 全局加载页（兜底，不会白屏） -->
  <div id="loadingPage" class="loading-page">
    <div class="win-spinner"></div>
    <p class="loading-text">正在启动在线聊天系统...</p>
  </div>

  <!-- Win11 全局通知 -->
  <div id="winNotify" class="win-notify hidden"></div>

  <!-- ====================== 页面1：登录页 ====================== -->
  <div id="loginPage" class="page active">
    <div class="win-card">
      <div class="logo">💬</div>
      <h2>登录 · 在线聊天系统</h2>
      <input type="email" id="loginEmail" class="win-input" placeholder="邮箱账号">
      <input type="password" id="loginPwd" class="win-input" placeholder="密码（≥8位）">
      <button class="win-btn primary" id="loginBtn">登录</button>
      <button class="win-btn text" id="toRegisterBtn">没有账号？立即注册</button>
    </div>
  </div>

  <!-- ====================== 页面2：注册页 ====================== -->
  <div id="registerPage" class="page hidden">
    <div class="win-card">
      <div class="logo">💬</div>
      <h2>注册 · 在线聊天系统</h2>
      <input type="text" id="regNick" class="win-input" placeholder="用户名">
      <input type="email" id="regEmail" class="win-input" placeholder="邮箱账号">
      <input type="password" id="regPwd" class="win-input" placeholder="密码（≥8位）">
      <button class="win-btn primary" id="regBtn">注册</button>
      <button class="win-btn text" id="toLoginBtn">已有账号？返回登录</button>
    </div>
  </div>

  <!-- ====================== 页面3：聊天主页 ====================== -->
  <div id="chatPage" class="page hidden">
    <div class="chat-header">
      <div class="left">
        <h2>在线聊天系统</h2>
        <p id="userTag">加载中...</p>
      </div>
      <div class="right">
        <button id="adminBtn" class="win-btn small secondary hidden">管理后台</button>
        <button id="settingBtn" class="win-btn small secondary">设置</button>
      </div>
    </div>

    <div id="announceBar" class="announce-bar hidden"></div>
    <div class="status-bar">在线人数：<span id="onlineNum">0</span></div>

    <div id="msgBox" class="msg-box"></div>

    <div class="send-bar">
      <input type="text" id="msgInput" class="win-input" placeholder="输入消息...">
      <button class="win-btn primary" id="sendBtn">发送</button>
    </div>
  </div>

  <!-- ====================== 页面4：设置页 ====================== -->
  <div id="settingPage" class="page hidden">
    <div class="page-header">
      <button class="win-btn icon" id="backToChatBtn">←</button>
      <h2>设置 · 在线聊天系统</h2>
    </div>
    <div class="setting-container">
      <div class="win-item">
        <label>昵称设置</label>
        <input type="text" id="nickInput" class="win-input" placeholder="设置你的昵称">
        <button class="win-btn primary" id="saveNickBtn">保存昵称</button>
      </div>
      <div class="win-item">
        <label>显示模式</label>
        <button class="win-btn secondary" id="toggleThemeBtn">切换深色/浅色模式</button>
      </div>
      <div class="win-item">
        <label>修改密码</label>
        <input type="password" id="newPwdInput" class="win-input" placeholder="新密码（≥8位）">
        <button class="win-btn warning" id="updatePwdBtn">修改密码</button>
      </div>
      <div class="win-item">
        <button class="win-btn secondary" id="showLoginLogBtn">查看我的登录日志</button>
      </div>
      <div class="win-item">
        <button class="win-btn danger" id="logoutBtn">退出登录</button>
      </div>
    </div>
  </div>

  <!-- ====================== 页面5：管理员后台 ====================== -->
  <div id="adminPage" class="page hidden">
    <div class="page-header">
      <button class="win-btn icon" id="backToChatFromAdminBtn">←</button>
      <h2>管理后台 · 在线聊天系统</h2>
    </div>
    <div class="admin-container">
      <div class="win-item">
        <h3>系统全局配置</h3>
        <div class="config-item">
          <label>
            <input type="checkbox" id="requireVerifyToggle">
            新用户注册需要管理员审核
          </label>
          <button class="win-btn small primary" id="saveConfigBtn">保存配置</button>
        </div>
      </div>

      <div class="win-item">
        <h3>待审核用户</h3>
        <div id="verifyUserList" class="list-box">暂无待审核用户</div>
      </div>

      <div class="win-item">
        <h3>全部用户管理</h3>
        <div id="allUserList" class="list-box">加载中...</div>
      </div>

      <div class="win-item">
        <h3>消息管理</h3>
        <button class="win-btn danger small" id="clearAllMsgBtn">清空所有历史消息</button>
      </div>

      <div class="win-item">
        <h3>敏感词过滤</h3>
        <input type="text" id="sensitiveWordsInput" class="win-input" placeholder="敏感词用英文逗号分隔">
        <button class="win-btn primary" id="saveSwBtn">保存敏感词</button>
      </div>

      <div class="win-item">
        <h3>全局公告</h3>
        <input type="text" id="announceInput" class="win-input" placeholder="输入全局公告内容">
        <button class="win-btn primary" id="saveAnnounceBtn">推送公告</button>
      </div>

      <div class="win-item">
        <h3>全量用户登录日志</h3>
        <div id="allLoginLogList" class="list-box">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 最后加载JS，确保DOM已经渲染完成 -->
  <script src="app.js"></script>
</body>
</html>
