<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f8f9fc">
  <meta name="description" content="KJLLin 的个人主页 | 在线聊天系统 | 恐龙快跑升级版">
  <title>KJLLin · 个人主页</title>
  <style>
    /* 全局统一变量 · 彻底解决深浅色同步问题 */
    :root {
      --bg-body: #f8f9fc;
      --bg-glass: rgba(255, 255, 255, 0.9);
      --bg-glass-hover: rgba(255, 255, 255, 0.95);
      --border-color: rgba(0, 0, 0, 0.06);
      --text-main: #1c1c1e;
      --text-secondary: #5c5c5c;
      --text-desc: #888888;
      --text-footer: #888888;
      --accent-blue: #0078d7;
      --accent-glow: rgba(0, 120, 212, 0.15);
      --shadow-light: 0 8px 26px rgba(0, 0, 0, 0.07);
      --shadow-hover: 0 14px 40px rgba(0, 0, 0, 0.13);
      --scroll-bar: #c1c1c1;
      --transition-smooth: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"]:root {
      --bg-body: #0f0f0f;
      --bg-glass: rgba(20, 20, 20, 0.9);
      --bg-glass-hover: rgba(26, 26, 26, 0.95);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-desc: #909090;
      --text-footer: #666666;
      --accent-blue: #0078d7;
      --accent-glow: rgba(0, 120, 212, 0.2);
      --shadow-light: 0 8px 26px rgba(0, 0, 0, 0.25);
      --shadow-hover: 0 14px 40px rgba(0, 0, 0, 0.35);
      --scroll-bar: #444444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: var(--transition-smooth);
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg-body);
      color: var(--text-main);
      position: relative;
    }

    /* Win11 云母动态背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
              radial-gradient(circle at 20% 20%, var(--accent-glow), transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(255,120,0,0.08), transparent 40%);
      z-index: -2;
      opacity: 0.9;
    }

    /* 加载遮罩 */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg-body);
      display: grid;
      place-items: center;
      z-index: 9999;
    }

    .loader-spin {
      width: 44px;
      height: 44px;
      border: 3px solid var(--accent-glow);
      border-top: 3px solid var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 磨砂玻璃基础样式 */
    .glass {
      background: var(--bg-glass);
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border-color);
    }

    .glass:hover {
      background: var(--bg-glass-hover);
    }

    /* 布局容器 */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px;
      position: relative;
      z-index: 1;
    }

    /* 导航栏 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 26px;
      border-radius: 14px;
      margin-bottom: 60px;
      box-shadow: var(--shadow-light);
      position: sticky;
      top: 20px;
      z-index: 99;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-blue);
    }

    /* 主题切换按钮 */
    .theme-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: grid;
      place-items: center;
      background: rgba(220, 220, 220, 0.5);
    }

    [data-theme="dark"] .theme-btn {
      background: rgba(40, 40, 40, 0.5);
      color: #ffd700;
    }

    .theme-btn:active {
      transform: scale(0.95);
    }

    /* 个人信息区域 */
    .profile {
      text-align: center;
      margin-bottom: 70px;
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 头像 + 呼吸光环 */
    .avatar-box {
      width: 110px;
      height: 110px;
      margin: 0 auto 24px;
      position: relative;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--accent-blue);
      color: #fff;
      font-size: 42px;
      font-weight: 700;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 34px var(--accent-glow);
      position: relative;
      z-index: 2;
    }

    .avatar-box::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: var(--accent-blue);
      z-index: 1;
      opacity: 0.2;
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,100%{ transform: scale(1); opacity:0.2; }
      50%{ transform: scale(1.08); opacity:0.1; }
    }

    .name {
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .desc {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* 项目区域 */
    .section-title {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 32px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.7s forwards 0.2s;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 80px;
    }

    /* 项目卡片 */
    .project-card {
      padding: 34px 30px;
      border-radius: 18px;
      box-shadow: var(--shadow-light);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.7s forwards;
    }

    .project-card:nth-child(1) { animation-delay: 0.3s; }
    .project-card:nth-child(2) { animation-delay: 0.4s; }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      transition: left 0.7s ease;
    }

    .project-card:hover::before { left: 100%; }
    .project-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: var(--shadow-hover); }

    .card-icon {
      font-size: 38px;
      margin-bottom: 20px;
    }

    .project-card:hover .card-icon { transform: scale(1.1); }

    .card-title {
      font-size: 21px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--accent-blue);
    }

    .card-desc {
      font-size: 15px;
      color: var(--text-desc);
      line-height: 1.6;
    }

    /* 返回顶部按钮 */
    #backTop {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      z-index: 98;
    }

    #backTop.show {
      opacity: 1;
      pointer-events: all;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 14px;
      color: var(--text-footer);
      border-top: 1px solid var(--border-color);
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--scroll-bar); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .container { padding: 24px 16px; }
      .navbar { padding: 16px 20px; margin-bottom: 40px; top: 12px; }
      .name { font-size: 32px; }
      .card-grid { grid-template-columns: 1fr; gap: 20px; }
      .avatar-box { width: 100px; height: 100px; }
      .avatar { font-size: 38px; }
      .project-card { padding: 28px 24px; }
    }

    /* 禁用不必要的选中 */
    * { user-select: none; -webkit-user-select: none; }
    input, textarea { user-select: text; -webkit-user-select: text; }
  </style>
</head>

<body>
<!-- 加载遮罩 -->
<div id="loader">
  <div class="loader-spin"></div>
</div>

<div class="container">
  <!-- 导航栏 -->
  <div class="navbar glass">
    <div class="logo">KJLLin</div>
    <button id="themeBtn" class="theme-btn">🌙</button>
  </div>

  <!-- 个人信息 -->
  <div class="profile">
    <div class="avatar-box">
      <div class="avatar">K</div>
    </div>
    <h1 class="name">KJLLin</h1>
    <p class="desc">独立前端开发者 | 创意创作者<br>专注开发简洁、稳定、流畅的 Web 应用</p>
  </div>

  <!-- 项目展示 -->
  <h2 class="section-title">我的作品</h2>
  <div class="card-grid">
    <a href="/chat" class="project-card glass">
      <div class="card-icon">💬</div>
      <h3 class="card-title">在线聊天系统</h3>
      <p class="card-desc">Windows11 风格实时聊天平台，内置账号系统、管理员后台、敏感词过滤、深色模式，全端兼容稳定运行。</p>
    </a>

    <a href="/game" class="project-card glass">
      <div class="card-icon">🦖</div>
      <h3 class="card-title">恐龙快跑升级版</h3>
      <p class="card-desc">Chrome 小恐龙深度优化版，升级操作手感、视觉效果与流畅度，一键开局，休闲跑酷最佳选择。</p>
    </a>
  </div>

  <!-- 页脚 -->
  <div class="footer">
    © 2025 KJLLin · All Rights Reserved
  </div>
</div>

<!-- 返回顶部按钮 -->
<button id="backTop" class="glass">↑</button>

<script>
  // 工具函数提前定义，修复变量提升报错
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  // 核心元素获取
  const root = document.documentElement;
  const themeBtn = $('#themeBtn');
  const loader = $('#loader');
  const backTop = $('#backTop');
  const metaTheme = $('meta[name="theme-color"]');

  // 页面加载完成关闭遮罩
  window.addEventListener('load', () => {
    setTimeout(() => {
      loader.style.opacity = 0;
      setTimeout(() => loader.remove(), 300);
    }, 300);
  });

  // 主题初始化（系统跟随+本地记忆）
  function initTheme() {
    try {
      const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const localDark = localStorage.getItem('theme') === 'dark';
      const useDark = localDark || sysDark;

      if (useDark) {
        root.dataset.theme = 'dark';
        themeBtn.textContent = '☀️';
        metaTheme.content = '#0f0f0f';
      } else {
        themeBtn.textContent = '🌙';
        metaTheme.content = '#f8f9fc';
      }
    } catch (e) {
      themeBtn.textContent = '🌙';
    }
  }
  initTheme();

  // 主题切换（修复同步问题）
  function toggleTheme() {
    try {
      const isDark = root.dataset.theme === 'dark';
      if (isDark) {
        root.dataset.theme = '';
        localStorage.removeItem('theme');
        themeBtn.textContent = '🌙';
        metaTheme.content = '#f8f9fc';
      } else {
        root.dataset.theme = 'dark';
        localStorage.setItem('theme', 'dark');
        themeBtn.textContent = '☀️';
        metaTheme.content = '#0f0f0f';
      }
    } catch(e) {
      console.error('主题切换异常', e);
    }
  }

  // 滚动监听（返回顶部显示）
  function handleScroll() {
    backTop.classList.toggle('show', window.scrollY > 300);
  }
  window.addEventListener('scroll', handleScroll);

  // 返回顶部功能
  backTop.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // 事件绑定（修复移动端点击无响应）
  themeBtn.addEventListener('click', toggleTheme);
  themeBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    toggleTheme();
  });
  backTop.addEventListener('touchstart', e => {
    e.preventDefault();
    backTop.click();
  });

  // 系统主题变化自动跟随
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', initTheme);
</script>
</body>
</html>
